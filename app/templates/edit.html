{% extends 'base.html' %}

{% block title %}Editar Cliente{% endblock %}

{% block content %}
<div class="topbar">
    <div class="topbar-left">
        <h1>Editar Cliente</h1>
        <p>Modifica la información de {{ client.name }}</p>
    </div>
    <div class="topbar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
        <a href="{{ url_for('dashboard.home') }}" class="btn btn-ghost">← Volver</a>
    </div>
</div>

<div class="edit-page">
    <div class="card">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="name" class="form-input" value="{{ client.name }}" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-input" value="{{ client.email }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="phone" class="form-input" value="{{ client.phone or '' }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Empresa</label>
                    <input type="text" name="company" class="form-input" value="{{ client.company or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Estado</label>
                <select name="status" class="form-input">
                    <option value="active" {{ 'selected' if client.status == 'active' }}>Activo</option>
                    <option value="inactive" {{ 'selected' if client.status == 'inactive' }}>Inactivo</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Notas</label>
                <textarea name="notes" class="form-input">{{ client.notes or '' }}</textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('dashboard.home') }}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
